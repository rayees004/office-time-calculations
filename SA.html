<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Approval</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(30, 41, 59, 0.9);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --accent-secondary: #a855f7;
            --danger: #ef4444;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: black;
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            background-attachment: fixed;
        }

        .container {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 1rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-left: 0.2rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        select option {
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        .cc-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .cc-item {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .btn-icon-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .btn-icon-danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            transform: scale(1.05);
        }

        .btn-add {
            background: transparent;
            color: var(--accent-primary);
            border: 1px dashed var(--accent-primary);
            border-radius: 12px;
            padding: 0.75rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .btn-add:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .entries-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .entry-item {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 0.75rem;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.3s ease;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-primary {
            flex: 1;
            background: green;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(64, 68, 75, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .entry-item {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top"
        style="background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(50px); border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Inter', sans-serif;">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <i class="bi bi-clock-history"></i> Avodha Tools
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="bi bi-house-door"></i> Punch Time</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="SA.html"><i
                                class="bi bi-envelope-paper"></i> Special Approval</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 80px;">
        <h1>Special Approval</h1>
        <p class="subtitle">Quickly generate your attendance approval request emails</p>

        <div class="form-group">
            <label for="toMail">To Mail</label>
            <input type="email" id="toMail" value="joseph.george@avodha.com" required
                placeholder="Enter primary recipient">
        </div>

        <div class="form-group">
            <label>CC Mails</label>
            <div class="cc-list" id="ccList">
                <!-- Defaults generated by JS -->
            </div>
            <button class="btn-add" onclick="addCC()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Add another CC
            </button>
        </div>

        <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject">
                <option value="Attendance Approval">Attendance Approval</option>
                <option value="Attendance Approval for Full Day" selected>Attendance Approval for Full Day</option>
            </select>
        </div>

        <div class="form-group">
            <label for="regNo">Registered Number</label>
            <input type="text" id="regNo" placeholder="e.g. 9988776655" required>
        </div>

        <div class="form-group">
            <label>Dates & Issues</label>
            <div class="entries-list" id="entriesList">
                <div class="entry-item">
                    <input type="date" class="entry-date" required>
                    <input type="text" class="entry-issue" placeholder="e.g. full day at thrissur centre" required>
                    <button class="btn-icon-danger" onclick="this.parentElement.remove()"
                        title="Remove Entry">&times;</button>
                </div>
            </div>
            <button class="btn-add" onclick="addEntry()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Add another date
            </button>
        </div>

        <div class="action-buttons">
            <button class="btn-primary" onclick="generateMail('gmail')">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                </svg>
                Open in Gmail
            </button>
            <button class="btn-secondary" onclick="generateMail('default')">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
                Default Mail App
            </button>
        </div>
    </div>

    <script>
        const defaultCCs = [
            "hr.central@avodha.co.in",
            "hr.bp@avodha.co.in",
            "coo@avodha.co.in",
            "live@avodha.co.in"
        ];

        function renderDefaultCCs() {
            const list = document.getElementById('ccList');
            defaultCCs.forEach(cc => {
                const div = document.createElement('div');
                div.className = 'cc-item';
                div.innerHTML = `
                    <input type="email" class="cc-input" value="${cc}" placeholder="CC Email">
                    <button class="btn-icon-danger" onclick="this.parentElement.remove()" title="Remove CC">&times;</button>
                `;
                list.appendChild(div);
            });
        }

        function addCC() {
            const list = document.getElementById('ccList');
            const div = document.createElement('div');
            div.className = 'cc-item';
            div.innerHTML = `
                <input type="email" class="cc-input" placeholder="CC Email">
                <button class="btn-icon-danger" onclick="this.parentElement.remove()" title="Remove CC">&times;</button>
            `;
            list.appendChild(div);
        }

        function addEntry() {
            const list = document.getElementById('entriesList');
            const div = document.createElement('div');
            div.className = 'entry-item';
            div.innerHTML = `
                <input type="date" class="entry-date" required>
                <input type="text" class="entry-issue" placeholder="e.g. full day at thrissur centre" required>
                <button class="btn-icon-danger" onclick="this.parentElement.remove()" title="Remove Entry">&times;</button>
            `;
            list.appendChild(div);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function generateMail(type) {
            const to = document.getElementById('toMail').value;
            if (!to) {
                alert("Please provide the 'To Mail'.");
                return;
            }

            const ccInputs = document.querySelectorAll('.cc-input');
            const ccs = Array.from(ccInputs).map(i => i.value.trim()).filter(v => v !== '');

            const subject = document.getElementById('subject').value;
            const regNo = document.getElementById('regNo').value;

            if (!regNo) {
                alert("Please provide Registered Number.");
                return;
            }

            const entriesList = document.querySelectorAll('.entry-item');
            const entryLines = [];

            for (let item of entriesList) {
                const date = item.querySelector('.entry-date').value;
                const issue = item.querySelector('.entry-issue').value;

                if (date && issue) {
                    entryLines.push(`${formatDate(date)} - ${issue}`);
                }
            }

            if (entryLines.length === 0) {
                alert("Please add at least one complete Date & Issue entry.");
                return;
            }

            const bodyContent = `Registered Number - ${regNo}\n${entryLines.join('\n')}`;

            if (type === 'gmail') {
                const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(to)}&cc=${encodeURIComponent(ccs.join(','))}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyContent)}`;
                window.open(url, '_blank');
            } else {
                const url = `mailto:${encodeURIComponent(to)}?cc=${encodeURIComponent(ccs.join(','))}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyContent)}`;
                window.location.href = url;
            }
        }

        // Initialize defaults
        renderDefaultCCs();

        // Populate current date in first entry
        const today = new Date().toISOString().split('T')[0];
        document.querySelector('.entry-date').value = today;
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
